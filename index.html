<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassar App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .app-container {
            width: 350px;
            height: 600px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
        }
        h1 { margin-top: 50px; font-size: 2.5rem; }
        p { font-size: 1.1rem; opacity: 0.9; }
        .btn {
            background: white;
            color: #6e8efb;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Mudassar</h1>
        <p>Welcome to your own Digital World!</p>
        <div style="font-size: 50px; margin: 20px;">📱</div>
        <button class="btn">Get Started</button>
        <p style="position: absolute; bottom: 20px; width: 100%; left: 0;">Developed by Mudassar</p>
    </div>

</body>
</html>
