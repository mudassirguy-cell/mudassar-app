<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassir AI Assistant</title>
    <style>
        /* Modern Glassmorphism Design */
        body { background: #0b0d11; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #1a1d23; padding: 15px; text-align: center; border-bottom: 2px solid #fe2c55; font-weight: bold; font-size: 20px; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #fe2c55; color: white; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #2a2e35; color: #ddd; border-bottom-left-radius: 2px; border: 1px solid #444; }

        /* Input Area */
        .input-box { background: #1a1d23; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #2a2e35; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        button { background: #fe2c55; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* Typing Animation */
        .typing { font-size: 12px; color: #888; margin-left: 10px; display: none; }
    </style>
</head>
<body>

<header>MUDASSIR AI CHATBOT 🤖</header>

<div id="chat-container">
    <div class="msg ai-msg">Assalam-o-Alaikum! Main Mudassir ka AI Assistant hoon. Main aapki kya madad kar sakta hoon?</div>
</div>

<div class="typing" id="typing">AI soch raha hai...</div>

<div class="input-box">
    <input type="text" id="user-input" placeholder="Yahan kuch likhein..." onkeypress="handleKey(event)">
    <button onclick="sendMessage()">Bhejo</button>
</div>

<script>
    function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

    function sendMessage() {
        let input = document.getElementById('user-input');
        let text = input.value.trim();
        if (!text) return;

        // User Message dikhana
        addMessage(text, 'user-msg');
        input.value = '';

        // AI Ka Response (Logic)
        document.getElementById('typing').style.display = 'block';
        
        setTimeout(() => {
            document.getElementById('typing').style.display = 'none';
            let reply = getAIResponse(text.toLowerCase());
            addMessage(reply, 'ai-msg');
        }, 1000);
    }

    function addMessage(text, className) {
        let container = document.getElementById('chat-container');
        let div = document.createElement('div');
        div.className = 'msg ' + className;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // AI Ki Akal (Yahan aap mazeed sawal jawab daal sakte hain)
    function getAIResponse(input) {
        if (input.includes('kaise ho')) return "Main bilkul theek hoon! Aap batayein?";
        if (input.includes('naam')) return "Mera naam Mudassir AI hai.";
        if (input.includes('khana')) return "Main AI hoon, main bijli aur data khata hoon! 😄";
        if (input.includes('bye')) return "Allah Hafiz! Phir milenge.";
        if (input.includes('mudassir')) return "Mudassir ek zabardast developer hai jisne mujhe banaya hai!";
        
        return "Hmm, ye dilchasp baat hai! Iske baare mein mazeed batayein?";
    }
</script>

</body>
</html>
