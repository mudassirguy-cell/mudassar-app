
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Jo Firebase Config aapne pehle copy kiya tha, wo yahan dubaara dalein
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "mudassir-reels.firebaseapp.com",
    databaseURL: "https://mudassir-reels-default-rtdb.firebaseio.com", // Aapki link
    projectId: "mudassir-reels",
    storageBucket: "mudassir-reels.appspot.com",
    messagingSenderId: "411777056267",
    appId: "1:411777056267:web:..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Comment bhejne ka function
  window.sendComment = function() {
    const text = document.getElementById("comment-input").value;
    if(text) {
      push(ref(db, 'comments'), { text: text });
      document.getElementById("comment-input").value = "";
    }
  }

  // Comments dikhane ka function
  onValue(ref(db, 'comments'), (snapshot) => {
    const data = snapshot.val();
    const display = document.getElementById("comments-display");
    display.innerHTML = "";
    for(let id in data) {
      display.innerHTML += `<p style="color:black; background:#eee; padding:5px; border-radius:5px;">${data[id].text}</p>`;
    }
  });
</script>

<div class="video-container">
  <video src="Aapki_Video_Link" loop autoplay muted></video>
  <div class="sidebar">
     <button onclick="alert('Liked!')">❤️</button>
     <button onclick="document.getElementById('comment-section').style.display='block'">💬</button>
  </div>
</div>

<div id="comment-section" style="display:none; position:fixed; bottom:0; width:100%; background:white; padding:20px; z-index:100;">
  <input id="comment-input" type="text" placeholder="Likho kuch...">
  <button onclick="sendComment()">Bhejo</button>
  <div id="comments-display" style="max-height:200px; overflow-y:auto;"></div>
  <button onclick="document.getElementById('comment-section').style.display='none'">Band karein</button>
</div>
