<script type="module">
    // Aapki Key bilkul sahi hai, ise mat badlein
    const MY_API_KEY = "AIzaSyAG8Na4WeEcxIJhje6i4AAgmm6u3WzTx5U"; 

    window.sendMessage = async function() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        input.value = '';
        document.getElementById('typing').style.display = 'block';

        try {
            // Version ko v1beta se v1 kar diya aur model check kiya
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                // Agar ab bhi error aaye toh screen par dikhayega
                addMessage("System Update: " + data.error.message, 'ai-msg');
            } else {
                const aiReply = data.candidates[0].content.parts[0].text;
                addMessage(aiReply, 'ai-msg');
            }
        } catch (error) {
            addMessage("Network Error: Connection check karein.", 'ai-msg');
        }
        document.getElementById('typing').style.display = 'none';
    }

    function addMessage(text, className) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'msg ' + className;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
