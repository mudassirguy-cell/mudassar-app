<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassar Reels Pro</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; }
        .video-container { height: 100vh; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* TikTok Style Sidebar */
        .sidebar { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; font-family: sans-serif; }
        .icon { font-size: 30px; cursor: pointer; }
        .icon span { font-size: 14px; display: block; }

        /* Comment Box */
        #comment-box { position: absolute; bottom: 0; background: rgba(255,255,255,0.9); width: 100%; padding: 15px; display: none; border-radius: 20px 20px 0 0; }
        input { width: 80%; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="video-container">
    <video src="YOUR_VIDEO_LINK_HERE" loop autoplay muted onclick="this.paused ? this.play() : this.pause()"></video>

    <div class="sidebar">
        <div class="icon" onclick="addLike()">❤️ <span id="like-count">0</span></div>
        <div class="icon" onclick="toggleComments()">💬 <span>12</span></div>
        <div class="icon">➡️ <span>Share</span></div>
    </div>

    <div id="comment-box">
        <h4>Comments</h4>
        <input type="text" placeholder="Write a comment...">
        <button onclick="toggleComments()">Close</button>
    </div>
</div>

<script>
    function addLike() {
        let count = document.getElementById('like-count');
        count.innerText = parseInt(count.innerText) + 1;
        alert("Shukriya! Like save ho gaya.");
    }
    function toggleComments() {
        let box = document.getElementById('comment-box');
        box.style.display = (box.style.display === 'none') ? 'block' : 'none';
    }
</script>

</body>
</html>
