<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassir AI Pro 🤖</title>
    <style>
        /* Modern Gaming & AI Theme */
        body { background: #0b0d11; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background: #1a1d23; padding: 15px; text-align: center; 
            border-bottom: 3px solid #fe2c55; font-weight: bold; font-size: 22px;
            box-shadow: 0 2px 10px rgba(254, 44, 85, 0.3);
        }

        /* Chat Window */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #0f1218; }
        
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { align-self: flex-end; background: #fe2c55; color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(254, 44, 85, 0.2); }
        .ai-msg { align-self: flex-start; background: #2a2e35; color: #e0e0e0; border: 1px solid #444; border-bottom-left-radius: 4px; }

        /* Input Section */
        .input-box { background: #1a1d23; padding: 15px; display: flex; gap: 12px; align-items: center; border-top: 1px solid #333; }
        
        input { 
            flex: 1; background: #2a2e35; border: 1px solid #444; padding: 14px; 
            border-radius: 30px; color: white; outline: none; font-size: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: #fe2c55; box-shadow: 0 0 5px #fe2c55; }
        
        .send-btn { 
            background: #fe2c55; border: none; color: white; padding: 12px 20px; 
            border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .send-btn:hover { background: #ff4d6d; transform: scale(1.05); }

        .typing { font-size: 13px; color: #fe2c55; margin-left: 25px; display: none; font-style: italic; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>MUDASSIR AI PRO 🤖</header>

<div id="chat-container">
    <div class="msg ai-msg">Assalam-o-Alaikum Mudassir! Main aapka AI Assistant hoon. Aap mujhse koi bhi sawal pooch sakte hain.</div>
</div>

<div class="typing" id="typing">AI jawab soch raha hai...</div>

<div class="input-box">
    <input type="text" id="user-input" placeholder="Kuch bhi poochein (Urdu ya English)..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" onclick="sendMessage()">BHEJO</button>
</div>

<script type="module">
    // Mudassir, aapki API Key yahan bilkul sahi tarah set hai
    const MY_API_KEY = "AIzaSyAG8Na4WeEcD4Ym4I3Wf9S6_lU0_mTx5U"; 

    window.sendMessage = async function() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        // User ka message screen par dikhana
        addMessage(text, 'user-msg');
        input.value = '';
        
        // Loading dikhana
        document.getElementById('typing').style.display = 'block';

        try {
            // Google Gemini AI se rabta (Connection)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                const aiReply = data.candidates[0].content.parts[0].text;
                document.getElementById('typing').style.display = 'none';
                addMessage(aiReply, 'ai-msg');
            } else {
                throw new Error("Invalid Response");
            }

        } catch (error) {
            console.error(error);
            document.getElementById('typing').style.display = 'none';
            addMessage("Maaf kijiyega, server se rabta nahi ho saka. Key check karein ya thoda intezar karein.", 'ai-msg');
        }
    }

    function addMessage(text, className) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'msg ' + className;
        div.innerText = text;
        container.appendChild(div);
        
        // Auto scroll niche tak
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
