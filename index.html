<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassir Voice AI</title>
    <style>
        body { background: #0b0d11; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1a1d23; padding: 30px; border-radius: 20px; border: 2px solid #fe2c55; box-shadow: 0 0 20px #fe2c55; }
        h2 { color: #fe2c55; text-transform: uppercase; }
        textarea { width: 100%; height: 100px; background: #2a303c; border: 1px solid #444; color: white; border-radius: 10px; padding: 10px; margin-bottom: 20px; outline: none; }
        .btn { background: #fe2c55; border: none; color: white; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; margin-bottom: 10px; }
        .btn:hover { background: white; color: #fe2c55; }
        .shairi-box { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .shairi-item { cursor: pointer; background: #2a2e35; padding: 10px; margin: 5px; border-radius: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Voice AI Shayeri 🎙️</h2>
    <p>Apni shayeri likhein ya niche di gayi shayeri par click karein:</p>
    
    <textarea id="text-to-speak" placeholder="Yahan apni shayeri ya koi baat likhein..."></textarea>
    
    <button class="btn" onclick="speakText()">AWAAZ SUNO 🔊</button>

    <div class="shairi-box">
        <h3>Famous Shairi</h3>
        <div class="shairi-item" onclick="quickShairi(this)">Khudi ko kar buland itna ke har taqdeer se pehle...</div>
        <div class="shairi-item" onclick="quickShairi(this)">Sitaron se aage jahan aur bhi hain...</div>
        <div class="shairi-item" onclick="quickShairi(this)">Mudassir ne banaya hai ye AI system zabardast...</div>
    </div>
</div>

<script>
    function speakText() {
        const text = document.getElementById('text-to-speak').value;
        if (text === "") {
            alert("Pehle kuch likhein!");
            return;
        }

        // Web Speech API
        const speech = new SpeechSynthesisUtterance();
        speech.text = text;
        speech.volume = 1;
        speech.rate = 0.9; // Awaz ki speed (0.1 se 10 tak)
        speech.pitch = 1; // Awaz ki bhaari-pan

        // Urdu/Hindi support koshish
        speech.lang = 'hi-IN'; 

        window.speechSynthesis.speak(speech);
    }

    function quickShairi(element) {
        document.getElementById('text-to-speak').value = element.innerText;
        speakText();
    }
</script>

</body>
</html>
