<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassir AI Pro 🤖</title>
    <style>
        body { background: #0b0d11; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1a1d23; padding: 15px; text-align: center; border-bottom: 3px solid #fe2c55; font-size: 20px; font-weight: bold; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #0f1218; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #fe2c55; color: white; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #2a2e35; color: #ddd; border: 1px solid #444; border-bottom-left-radius: 2px; }
        .input-box { background: #1a1d23; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #2a2e35; border: 1px solid #444; padding: 12px; border-radius: 25px; color: white; outline: none; }
        button { background: #fe2c55; border: none; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .typing { font-size: 12px; color: #fe2c55; margin-left: 20px; display: none; padding-bottom: 10px; font-style: italic; }
    </style>
</head>
<body>

<header>MUDASSIR AI PRO 🤖</header>
<div id="chat-container">
    <div class="msg ai-msg">Assalam-o-Alaikum Mudassir! Main ab bilkul tayyar hoon. Mujhse kuch bhi poochein!</div>
</div>
<div class="typing" id="typing">AI soch raha hai...</div>

<div class="input-box">
    <input type="text" id="user-input" placeholder="Yahan likhein..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Bhejo</button>
</div>

<script type="module">
    // Aapki Nayi API Key yahan sahi se set kar di hai
    const MY_API_KEY = "AIzaSyAG8Na4WeEcxIJhje6i4AAgmm6u3WzTx5U"; 

    window.sendMessage = async function() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        input.value = '';
        document.getElementById('typing').style.display = 'block';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            
            if (data.error) {
                addMessage("Error: " + data.error.message, 'ai-msg');
            } else {
                const aiReply = data.candidates[0].content.parts[0].text;
                addMessage(aiReply, 'ai-msg');
            }
        } catch (error) {
            addMessage("Network Error: Internet check karein.", 'ai-msg');
        }
        document.getElementById('typing').style.display = 'none';
    }

    function addMessage(text, className) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'msg ' + className;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
