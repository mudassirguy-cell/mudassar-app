!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassir Voice Studio Pro</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 450px; margin: auto; background: #111; padding: 30px; border-radius: 25px; border: 2px solid #fe2c55; box-shadow: 0 0 30px rgba(254,44,85,0.3); }
        h1 { color: #fe2c55; letter-spacing: 2px; }
        p { color: #888; font-size: 14px; }
        
        textarea { width: 100%; height: 150px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 15px; padding: 15px; font-size: 16px; outline: none; margin-bottom: 20px; border-left: 4px solid #fe2c55; }
        
        .btn { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .play-btn { background: #fe2c55; color: white; box-shadow: 0 5px 15px rgba(254, 44, 85, 0.4); }
        .download-btn { background: #28a745; color: white; display: none; text-decoration: none; line-height: 15px; }
        
        .status { margin-top: 20px; font-size: 14px; color: #fe2c55; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>STORY VOICE AI 🎙️</h1>
    <p>TikTok & Reels ke liye Shayeri aur Kahaniyan banayein</p>
    
    <textarea id="text" placeholder="Yahan apni pur-asar shayeri ya kahani likhein..."></textarea>
    
    <div id="status" class="status">System Ready...</div>

    <button class="btn play-btn" onclick="generateAndRecord()">BANAIN AUR SUNAIN</button>
    <a id="downloadLink" class="btn download-btn">FILE DOWNLOAD KAREIN (MP3/WAV) 📥</a>
</div>

<script>
    let audioChunks = [];
    let mediaRecorder;

    async function generateAndRecord() {
        const text = document.getElementById('text').value;
        if (!text) return alert("Pehle kuch likhein!");

        const status = document.getElementById('status');
        status.innerText = "AI Recording Started...";

        // Voice Configuration for Storytelling
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN'; // Best for Urdu/Hindi
        msg.rate = 0.82;    // Thoda slow taake ehsas paida ho
        msg.pitch = 0.9;    // Thodi bhari aur mardana (Deep) awaz

        // Audio Recording Setup
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const link = document.getElementById('downloadLink');
            link.href = url;
            link.download = "Mudassir_Deep_Voice.wav";
            link.style.display = "block";
            status.innerText = "Recording Complete! Niche se download karein.";
        };

        mediaRecorder.start();
        window.speechSynthesis.speak(msg);

        msg.onend = () => {
            setTimeout(() => {
                mediaRecorder.stop();
                stream.getTracks().forEach(track => track.stop());
            }, 500); // Thoda extra gap recording ke liye
        };
    }
</script>

</body>
</html>
