<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassar Reels</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .video-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { position: relative; height: 100vh; width: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; color: white; text-align: center; font-size: 30px; z-index: 10; }
        .user-info { position: absolute; left: 15px; bottom: 40px; color: white; z-index: 10; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        .header { position: absolute; top: 15px; width: 100%; text-align: center; color: white; font-weight: bold; z-index: 10; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">Mudassar Reels</div>
    <div class="video-container">
        <div class="video-card">
            <video loop autoplay muted playsinline src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-1282-large.mp4"></video>
            <div class="sidebar"><div>❤️</div><div>💬</div><div>➡️</div></div>
            <div class="user-info"><h3>@Mudassar_Official</h3><p>Welcome to my TikTok Clone! 🚀</p></div>
        </div>
        <div class="video-card">
            <video loop muted playsinline src="https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-1173-large.mp4"></video>
            <div class="sidebar"><div>❤️</div><div>💬</div><div>➡️</div></div>
            <div class="user-info"><h3>@Mudassar_Vlogs</h3><p>Nature is beautiful! 🌿</p></div>
        </div>
    </div>
    <script>
        const videos = document.querySelectorAll('video');
        videos.forEach(v => { v.addEventListener('click', () => { if (v.paused) v.play(); else v.pause(); }); });
    </script>
</body>
</html>
