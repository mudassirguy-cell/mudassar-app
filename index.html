<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudassir Voice Studio</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 450px; margin: auto; background: #111; padding: 30px; border-radius: 25px; border: 2px solid #fe2c55; }
        h1 { color: #fe2c55; }
        textarea { width: 100%; height: 120px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; outline: none; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .play-btn { background: #fe2c55; color: white; }
        .download-btn { background: #28a745; color: white; display: none; } /* Shuru mein hiden rahega */
        .status { margin-top: 15px; font-size: 14px; color: #fe2c55; }
    </style>
</head>
<body>

<div class="box">
    <h1>Voice Downloader 📥</h1>
    <textarea id="text" placeholder="Apni video ka script likhein..."></textarea>
    
    <div class="btn-group">
        <button class="btn play-btn" onclick="startRecording()">AWAAZ BANAIN AUR SUNAIN</button>
        <a id="downloadLink" class="btn download-btn">FILE DOWNLOAD KAREIN 📁</a>
    </div>
    
    <div id="status" class="status">Ready...</div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];

    async function startRecording() {
        const text = document.getElementById('text').value;
        if (!text) return alert("Kuch likhein!");

        document.getElementById('status').innerText = "AI Processing...";
        
        // Voice Setup
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN';
        msg.rate = 0.8;

        // Recording Logic
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const audioUrl = URL.createObjectURL(audioBlob);
            const link = document.getElementById('downloadLink');
            link.href = audioUrl;
            link.download = "Mudassir_Voice.wav";
            link.style.display = "block";
            document.getElementById('status').innerText = "Taiyar hai! Download karein.";
        };

        // Start Recording and Speaking
        mediaRecorder.start();
        window.speechSynthesis.speak(msg);

        msg.onend = () => {
            mediaRecorder.stop();
            stream.getTracks().forEach(track => track.stop());
        };
    }
</script>

</body>
</html>
